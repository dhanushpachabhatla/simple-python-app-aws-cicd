version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Upgrading pip"
      - python -m pip install --upgrade pip
      - echo "Installing dependencies"
      - pip install -r requirements.txt
      - pip install pytest

  build:
    commands:
      - echo "Running tests"
      - pytest

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
